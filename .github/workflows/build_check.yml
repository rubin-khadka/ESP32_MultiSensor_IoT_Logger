name: ESP32 Build Check

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          cd /opt/esp/idf
          . ./export.sh
          cd $GITHUB_WORKSPACE
          idf.py set-target esp32
          idf.py build