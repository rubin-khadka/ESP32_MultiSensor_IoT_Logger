name: ESP32 Build Check

on: 
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up ESP-IDF
        run: |
          # Clone ESP-IDF
          git clone --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          git checkout v5.1
          ./install.sh esp32

      - name: Build Project
        run: |
          # Load ESP-IDF environment
          . esp-idf/export.sh
          
          # Build
          idf.py set-target esp32
          idf.py build